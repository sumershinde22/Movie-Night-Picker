# Render Blueprint for Movie Night Picker.
services:
  - type: web
    name: movie-night-picker
    runtime: node
    plan: free
    buildCommand: >
      cd frontend && npm install --include=dev && npm run build &&
      cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_NAME
        value: movie_night
      - key: MONGO_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
